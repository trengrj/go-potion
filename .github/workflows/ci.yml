name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Tests download every POTION model on first run; cache them so CI
      # only pays that cost when the model list changes.
      - name: Cache model files
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-potion
          key: potion-models-${{ hashFiles('potion.go') }}
          restore-keys: potion-models-

      # The Go tests replay reference samples generated by the Python
      # model2vec library; they are not committed, so regenerate them
      # whenever the generator script changes.
      - name: Cache validation samples
        id: samples
        uses: actions/cache@v4
        with:
          path: validation/samples
          key: potion-samples-${{ hashFiles('validation/generate_tests.py') }}

      - name: Install uv
        if: steps.samples.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Generate validation samples
        if: steps.samples.outputs.cache-hit != 'true'
        run: uv run validation/generate_tests.py

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
